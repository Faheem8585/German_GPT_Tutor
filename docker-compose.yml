version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-germangpt}:${POSTGRES_PASSWORD:-germangpt_secret}@postgres:5432/${POSTGRES_DB:-germangpt}
  REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
  QDRANT_URL: http://qdrant:6333
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  DEFAULT_LLM_PROVIDER: ${DEFAULT_LLM_PROVIDER:-gemini}
  DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-gemma-3-12b-it}
  DEFAULT_EMBEDDING_MODEL: ${DEFAULT_EMBEDDING_MODEL:-models/text-embedding-004}
  JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret}
  ENVIRONMENT: ${ENVIRONMENT:-development}
  DEBUG: ${DEBUG:-true}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8000}
  ENABLE_RAG: ${ENABLE_RAG:-true}
  ENABLE_VOICE: ${ENABLE_VOICE:-true}
  ENABLE_GAMES: ${ENABLE_GAMES:-true}

services:
  # ─── Core Database ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: germangpt_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-germangpt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-germangpt_secret}
      POSTGRES_DB: ${POSTGRES_DB:-germangpt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-germangpt}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Cache ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: germangpt_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ─── Vector Database ─────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: germangpt_qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 15s
    logging: *default-logging

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: germangpt_backend
    environment:
      <<: *backend-env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - audio_uploads:/app/uploads
    restart: unless-stopped
    logging: *default-logging

  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: germangpt_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    logging: *default-logging

  # ─── Observability ───────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: germangpt_prometheus
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.4.0
    container_name: germangpt_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  audio_uploads:

networks:
  default:
    name: germangpt_network
    driver: bridge
